name: Deploy Backend
on:
  push:
    branches: [ "release" ]

jobs:
  deploy:
    name: Deploy to Self-Hosted Server
    runs-on: self-hosted

    steps:
      - name: Update code and infrastructure
        run: |
          # 1. NAVEGAR AL REPO DE BACKEND
          cd ~/Proyecto-ARSW/ZOmbiland-Backend
          
          # 2. ACTUALIZAR EL CODIGO (FORZADO)
          git fetch origin release
          git reset --hard origin/release
          
          # 3. COPIAR ARCHIVOS DE INFRAESTRUCTURA A LA RAÍZ
          cp docker-compose.yml ..
          cp nginx.conf ..
          cp tailscale-serve-config.json ..
          
          # 4. ACTUALIZAR TAILSCALE SERVE
          # Usamos --all para asegurar que se aplique a todo el nodo
          tailscale serve set-config --all < tailscale-serve-config.json
          
          # 5. RECONSTRUIR Y REINICIAR TODO EL PROYECTO
          cd ..
          docker compose up -d --build --force-recreate --remove-orphans
          
          # 6. LIMPIEZA DE IMAGENES ANTIGUAS
          docker image prune -f
