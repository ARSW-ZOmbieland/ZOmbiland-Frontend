services:
  postgres:
    image: postgres:15
    container_name: zombieland-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zombieland
      POSTGRES_PASSWORD: zombieland_password
      POSTGRES_DB: zombieland_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zombieland -d zombieland_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./ZOmbiland-Backend
      dockerfile: Dockerfile
    container_name: zombieland-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://zombieland-postgres:5432/zombieland_db
      SPRING_DATASOURCE_USERNAME: zombieland
      SPRING_DATASOURCE_PASSWORD: zombieland_password
      APP_FRONTEND_URL: https://server-sabio.tail2474b3.ts.net
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost,https://server-sabio.tail2474b3.ts.net
      GOOGLE_CLIENT_ID: 271245333435-cub8t5t9okf2jl48tcbkipkpf0estetl.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./ZOmbiland-Frontend
      dockerfile: Dockerfile.dev
    container_name: zombiland-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./ZOmbiland-Frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=https://server-sabio.tail2474b3.ts.net
    command: sh -c "npm install && npm run dev -- --host"

  nginx:
    image: nginx:alpine
    container_name: zombieland-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ZOmbiland-Frontend/public:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
